<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NitHigh Bites Broken</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <nav>
            <h2>NitHigh Bites</h2>
            <button onclick="checkHealth()">Check Backend</button>
        </nav>
        <div>
            <h1>Campus Food, Fast & Fresh</h1>
            <p>Broken food ordering website debugging challenge.</p>
            <p id="healthResult"></p>
        </div>
    </header>

    <main>
        <section class="search-box">
            <input id="searchInput" placeholder="Search food">
            <button onclick="searchFoods()">Search</button>
            <button onclick="loadFoods()">Show All</button>
        </section>

        <section>
            <h2>Menu</h2>
            <div id="foodList" class="grid"></div>
        </section>

        <section class="cart-panel">
            <h2>Your Cart</h2>
            <div id="cartItems"></div>
            <h3 id="cartTotal">Total: ₹0</h3>
            <input id="customerName" placeholder="Your name">
            <button onclick="placeOrder()">Place Order</button>
        </section>

        <section>
            <h2>Orders</h2>
            <button onclick="loadOrders()">Refresh Orders</button>
            <div id="orderList"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
